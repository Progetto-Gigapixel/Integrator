[defaults]
mode = AM
format = tif
language = en
patch_size = 24
output_color_space = display-p3
output_path = ./
output_format = tif
fitting_degree = 1
rt_sharpening = False
rt_light_balance = False
skip_exposure = False
skip_rawtherapee = False
skip_wb = False
skip_ccm = False
skip_finlayson_ccm = False
skip_ridge_ccm = False
skip-flat-fielding = False
skip_wls = False
skip_poly = False
skip_shaft = False
process_subfolders = False
